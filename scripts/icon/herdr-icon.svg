<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- herdr app mark: a terminal prompt (chevron + cursor) on a dark squircle
       tile, using the app's own accent blue and ok-green from the UI palette. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3346"/>
      <stop offset="1" stop-color="#12151c"/>
    </linearGradient>
  </defs>
  <rect x="96" y="96" width="832" height="832" rx="188" fill="url(#bg)"/>
  <!-- prompt chevron ">" -->
  <path d="M338 388 L470 512 L338 636" fill="none" stroke="#5b9dff"
        stroke-width="60" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor underscore -->
  <rect x="524" y="606" width="182" height="56" rx="28" fill="#6ac47a"/>
</svg>
